name: Generate Changelog JSON for ChangelogWP.com
description: Generate a structured JSON changelog file from CHANGELOG.md and the plugin header

inputs:
  plugin-id:
    description: 'The WooCommerce product ID (id field in JSON) - Uses the first space-separated token if multiple IDs are provided'
    required: true
  plugin-name:
    description: 'The human-readable plugin name (name field in JSON)'
    required: true
  plugin-homepage:
    description: 'The public URL of the plugin product page (homepage field in JSON)'
    required: true
  plugin-changelog-link:
    description: 'The public URL of the plugin changelog page (link field in JSON)'
    required: true
  plugin-slug:
    description: 'The slug of the plugin - Defaults to env.SLUG'
    default: ''
  plugin-version:
    description: 'The version of the plugin - Defaults to github.ref_name (the tag name)'
    default: ''
  changelog-file:
    description: 'Path to the CHANGELOG.md file'
    default: 'CHANGELOG.md'
  plugin-file:
    description: 'Path to the main plugin PHP file for header parsing - Defaults to {slug}.php'
    default: ''
  output-file:
    description: 'Filename of the JSON file to write - Defaults to {slug}.json'
    default: ''

runs:
  using: 'composite'
  steps:
    - name: 📋 Generate Changelog JSON
      shell: bash
      run: |
        INPUT_SLUG="${{ inputs.plugin-slug }}"
        SLUG_VALUE="${INPUT_SLUG:-$SLUG}"
        INPUT_VERSION="${{ inputs.plugin-version }}"
        REF_NAME="${{ github.ref_name }}"
        VERSION_VALUE="${INPUT_VERSION:-$REF_NAME}"
        INPUT_PLUGIN_FILE="${{ inputs.plugin-file }}"
        PLUGIN_FILE="${INPUT_PLUGIN_FILE:-$SLUG_VALUE.php}"
        INPUT_OUTPUT="${{ inputs.output-file }}"
        OUTPUT_FILE="${INPUT_OUTPUT:-$SLUG_VALUE.json}"

        export GNCLJ_ID="${{ inputs.plugin-id }}"
        export GNCLJ_NAME="${{ inputs.plugin-name }}"
        export GNCLJ_HOMEPAGE="${{ inputs.plugin-homepage }}"
        export GNCLJ_LINK="${{ inputs.plugin-changelog-link }}"
        export GNCLJ_SLUG="$SLUG_VALUE"
        export GNCLJ_VERSION="$VERSION_VALUE"
        export GNCLJ_CHANGELOG_FILE="${{ inputs.changelog-file }}"
        export GNCLJ_PLUGIN_FILE="$PLUGIN_FILE"
        export GNCLJ_OUTPUT_FILE="$OUTPUT_FILE"

        python3 "$GITHUB_ACTION_PATH/generate.py"
